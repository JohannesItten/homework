vrrp_script master_priority {
    script /etc/keepalived/master.sh
    interval 10
    fall 1
    rise 1
}

vrrp_instance VI_1 {
    state MASTER
    interface eth0
    virtual_router_id 200
    priority 255
    advert_int 1

    virtual_ipaddress {
        10.5.1.200/24
    }

    track_script {
        master_priority
    }
}
