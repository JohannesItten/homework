vrrp_script check_nginx {
    script "/etc/keepalived/check_nginx.sh"
    interval 3
    fall 1
    rise 1
}

vrrp_instance VI_1 {
    state MASTER
    interface eth0
    virtual_router_id 200
    priority 255
    advert_int 1

	track_script {
        check_nginx
	}

    virtual_ipaddress {
        10.5.1.200/24
    }
}
